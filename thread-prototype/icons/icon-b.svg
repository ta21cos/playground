<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="108" fill="#18181b"/>
  <!-- 縦の糸 (thread) + ノード -->
  <g stroke="#ffffff" stroke-linecap="round">
    <!-- メインの糸 -->
    <line x1="200" y1="120" x2="200" y2="400" stroke-width="4" opacity="0.4"/>
    <!-- ノード (メッセージ) -->
    <circle cx="200" cy="160" r="16" fill="#ffffff" stroke="none"/>
    <circle cx="200" cy="260" r="16" fill="#ffffff" stroke="none"/>
    <circle cx="200" cy="360" r="16" fill="#ffffff" stroke="none"/>
    <!-- 右に伸びるテキスト行 -->
    <line x1="230" y1="160" x2="350" y2="160" stroke-width="12" opacity="0.9"/>
    <line x1="230" y1="260" x2="380" y2="260" stroke-width="12" opacity="0.6"/>
    <line x1="230" y1="360" x2="330" y2="360" stroke-width="12" opacity="0.35"/>
  </g>
</svg>
