<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="108" fill="#18181b"/>
  <!-- 重なる吹き出し3つ = スレッドの連なり -->
  <g fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="round" stroke-linejoin="round">
    <rect x="120" y="100" width="200" height="80" rx="20" opacity="0.35"/>
    <rect x="150" y="180" width="220" height="80" rx="20" opacity="0.6"/>
    <rect x="130" y="260" width="240" height="80" rx="20" opacity="1.0"/>
  </g>
  <!-- 接続線 -->
  <line x1="220" y1="180" x2="220" y2="180" stroke="#ffffff" stroke-width="3" opacity="0.4"/>
</svg>
